                    status: enrollment_required
                    org_id: org-1
                    email: analyst@example.com
                    mfa_required: true
                    mfa_status: required_not_enrolled
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Request rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/auth/mfa/challenge/verify:
    post:
      tags:
        - Auth
      summary: Verify an MFA challenge
      description: Completes an MFA sign-in challenge with either a TOTP code or a recovery code.
      operationId: postMfaChallengeVerify
      security:
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - challenge_id
                - code
              properties:
                challenge_id:
                  type: string
                code:
                  type: string
            example:
              challenge_id: b8d3edbe-5d39-4c67-bf44-7bb5ea7d0f70
              code: '123456'
      responses:
        '200':
          description: MFA challenge completed.
          content:
            application/json:
              schema:
                type: object
              example:
                status: authenticated
                org_id: org-1
                email: analyst@example.com
                method: totp
                recovery_code_used: false
                mfa_required: true
                mfa_status: verified_totp
        '401':
          description: Invalid, expired, or already-consumed challenge or MFA code.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Request rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/auth/mfa/enroll/start:
    post:
      tags:
        - Auth
      summary: Start TOTP enrollment
      description: Validates primary credentials and returns a TOTP secret plus provisioning URI.
      operationId: postMfaEnrollStart
      security:
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - org_id
                - email
                - password
              properties:
                org_id:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Enrollment secret generated and stored pending confirmation.
          content:
            application/json:
              schema:
                type: object
              example:
                status: pending_confirmation
                org_id: org-1
                email: analyst@example.com
                secret: JBSWY3DPEHPK3PXP
                provisioning_uri: otpauth://totp/Trailing:analyst@example.com?secret=JBSWY3DPEHPK3PXP&issuer=Trailing&period=30
                mfa_status: pending_enrollment
        '400':
          description: MFA is already enabled or enrollment is not in a valid state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/auth/mfa/enroll/confirm:
    post:
      tags:
        - Auth
      summary: Confirm TOTP enrollment
      description: Verifies the pending TOTP secret and enables MFA for the human account.
      operationId: postMfaEnrollConfirm
      security:
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - org_id
                - email
                - password
                - code
              properties:
                org_id:
                  type: string
                email:
                  type: string
                password:
                  type: string
                code:
                  type: string
      responses:
        '200':
          description: MFA enabled and recovery codes generated.
          content:
            application/json:
              schema:
                type: object
              example:
                status: enabled
                org_id: org-1
                email: analyst@example.com
                recovery_codes:
                  - A1B2-C3D4
                  - E5F6-G7H8
                mfa_status: enabled
        '400':
          description: MFA is already enabled or enrollment has not started.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials or TOTP code.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/orgs/{org_id}/mfa-policy:
    get:
      tags:
        - Auth
      summary: Read org MFA policy
      description: Returns whether MFA is optional or required for the specified organization.
      operationId: getOrgMfaPolicy
      parameters:
        - name: org_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Current org MFA policy.
          content:
            application/json:
              schema:
                type: object
              example:
                org_id: org-1
                policy: required
    put:
      tags:
        - Auth
      summary: Update org MFA policy
      description: Persists an organization-level MFA enforcement policy and records an auth policy audit event.
      operationId: putOrgMfaPolicy
      parameters:
        - name: org_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - policy
              properties:
                policy:
                  type: string
                  enum:
                    - optional
                    - required
            example:
              policy: required
      responses:
        '200':
          description: Updated org MFA policy.
          content:
            application/json:
              schema:
                type: object
              example:
                org_id: org-1
                policy: required
        '400':
          description: Invalid policy value.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: API key required when the server is configured with one.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/admin/orgs/{org_id}/sso/saml:
    get:
      tags:
        - Auth
      summary: Fetch org SAML IdP configuration
      description: Returns the stored SAML identity provider configuration for the specified organization.
      operationId: getSamlConfig
      parameters:
        - name: org_id
          in: path
          required: true
          schema:
            type: string
          example: org-1
      responses:
        '200':
          description: SAML identity provider configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SamlIdpConfig'
              example:
                org_id: org-1
                enabled: true
                idp_entity_id: https://idp.example.com/metadata
                sso_url: https://idp.example.com/sso
                idp_certificate_pem: |
                  -----BEGIN CERTIFICATE-----
                  MIIB...==
                  -----END CERTIFICATE-----
                sp_entity_id: trailing
                acs_url: https://trailing.example.com/v1/sso/saml/org-1/acs
                email_attribute: email
                first_name_attribute: firstName
                last_name_attribute: lastName
                role_attribute: groups
                role_mappings:
                  trailing-admins: admin
                  trailing-auditors: auditor
                default_role: read_only
                created_at: '2026-03-01T00:00:00Z'
                updated_at: '2026-03-30T12:00:00Z'
        '401':
          description: Admin role required for this organization when auth is enforced.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: admin role required for this organization
                code: UNAUTHORIZED
        '404':
          description: SAML configuration not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: SAML config for org `org-1` not found
                code: NOT_FOUND
        '429':
          description: Request rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: rate limit exceeded
                code: RATE_LIMITED
        '500':
          description: Storage or internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "storage error: failed to load SAML config"
                code: INTERNAL_ERROR
    put:
      tags:
        - Auth
      summary: Create or update org SAML IdP configuration
      description: Upserts the SAML identity provider configuration for the specified organization.
      operationId: putSamlConfig
      parameters:
        - name: org_id
          in: path
          required: true
          schema:
            type: string
          example: org-1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SamlConfigRequest'
            example:
              enabled: true
              idp_entity_id: https://idp.example.com/metadata
              sso_url: https://idp.example.com/sso
              idp_certificate_pem: |
                -----BEGIN CERTIFICATE-----
                MIIB...==
                -----END CERTIFICATE-----
              sp_entity_id: trailing
              acs_url: https://trailing.example.com/v1/sso/saml/org-1/acs
              email_attribute: email
              first_name_attribute: firstName
              last_name_attribute: lastName
              role_attribute: groups
              role_mappings:
                trailing-admins: admin
                trailing-auditors: auditor
              default_role: read_only
      responses:
        '201':
          description: SAML configuration created or updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SamlIdpConfig'
              example:
                org_id: org-1
                enabled: true
                idp_entity_id: https://idp.example.com/metadata
                sso_url: https://idp.example.com/sso
                idp_certificate_pem: |
                  -----BEGIN CERTIFICATE-----
                  MIIB...==
                  -----END CERTIFICATE-----
                sp_entity_id: trailing
                acs_url: https://trailing.example.com/v1/sso/saml/org-1/acs
                email_attribute: email
                first_name_attribute: firstName
                last_name_attribute: lastName
                role_attribute: groups
                role_mappings:
                  trailing-admins: admin
                  trailing-auditors: auditor
                default_role: read_only
                created_at: '2026-03-01T00:00:00Z'
                updated_at: '2026-03-30T12:00:00Z'
        '400':
          description: Invalid JSON body, missing required SAML fields, or unsupported internal role mapping.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: unsupported internal role `super_admin`
                code: INVALID_REQUEST
        '401':
          description: Admin role required for this organization when auth is enforced.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: admin role required for this organization
                code: UNAUTHORIZED
        '413':
          description: Request body exceeded the configured size limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Failed to buffer the request body
                code: REQUEST_TOO_LARGE
        '429':
          description: Request rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: rate limit exceeded
                code: RATE_LIMITED
        '500':
          description: Storage or internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "storage error: failed to save SAML config"
                code: INTERNAL_ERROR
  /v1/sso/saml/{org_id}/acs:
    post:
      tags:
        - Auth
      summary: Complete SAML ACS sign-in
      description: >
        Validates a SAML assertion for the specified organization, provisions or
        updates the mapped user, and returns a session token. The endpoint
        accepts JSON or form-encoded `SAMLResponse` payloads.
      operationId: postSamlAcs
      security:
        - {}
      parameters:
        - name: org_id
          in: path
          required: true
          schema:
            type: string
          example: org-1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SamlAcsRequest'
            example:
              saml_response: PHNhbWxwOlJlc3BvbnNlPi4uLjwvc2FtbHA6UmVzcG9uc2U+
              relay_state: dashboard
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - SAMLResponse
              properties:
                SAMLResponse:
                  type: string
                RelayState:
                  type: string
            example:
              SAMLResponse: PHNhbWxwOlJlc3BvbnNlPi4uLjwvc2FtbHA6UmVzcG9uc2U+
              RelayState: dashboard
      responses:
        '200':
          description: SAML assertion accepted and session created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SsoSessionResponse'
              example:
                org_id: org-1
                session_token: trailing_sess_123
                expires_at: '2026-03-30T20:00:00Z'
                relay_state: dashboard
                user:
                  id: user_123
                  org_id: org-1
                  external_subject: analyst@example.com
                  email: analyst@example.com
                  first_name: Alex
                  last_name: Analyst
                  display_name: Alex Analyst
                  role: admin
                  created_at: '2026-03-01T00:00:00Z'
                  last_login_at: '2026-03-30T12:00:00Z'
        '400':
          description: Invalid JSON body, invalid form body, or missing `SAMLResponse`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: missing required field `SAMLResponse`
                code: MISSING_FIELD
        '401':
          description: SAML is disabled for the organization or the assertion is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "invalid SAML assertion: response signature is invalid"
                code: UNAUTHORIZED
        '404':
          description: SAML configuration not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: SAML config for org `org-1` not found
                code: NOT_FOUND
        '429':
          description: Request rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: rate limit exceeded
                code: RATE_LIMITED
        '500':
          description: Storage or internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "storage error: failed to create SSO session"
                code: INTERNAL_ERROR
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: >
        Optional header. When the server is configured with `TRAILING_API_KEY`,
        requests under `/v1` must include this value.
        Ingest writes also require an org scope via `X-Trailing-Org-Id`.
  schemas:
    ErrorResponse:
      type: object
      required:
        - error
        - code
      properties:
        error:
          type: string
        code:
          type: string
          enum:
            - INVALID_JSON
            - MISSING_FIELD
            - NOT_FOUND
            - UNSUPPORTED_FRAMEWORK
            - RATE_LIMITED
            - UNAUTHORIZED
            - INVALID_REQUEST
            - INTERNAL_ERROR
            - REQUEST_TOO_LARGE
    IngestResponse:
      type: object
      required:
        - ingested
        - action_ids
      properties:
        ingested:
          type: integer
          minimum: 0
        action_ids:
          type: array
          items:
            type: string
            format: uuid
    BatchIngestResponse:
      type: object
      required:
        - ingested
        - failed
        - action_ids
        - results
      properties:
        ingested:
          type: integer
          minimum: 0
        failed:
          type: integer
          minimum: 0
        action_ids:
          type: array
          items:
            type: string
            format: uuid
        results:
          type: array
          items:
            $ref: '#/components/schemas/BatchIngestItemResult'
    BatchIngestItemResult:
      type: object
      required:
        - index
        - status
      properties:
        index:
          type: integer
          minimum: 0
        status:
          type: string
          enum:
            - accepted
            - duplicate
            - rejected
        action_id:
          type: string
          format: uuid
          nullable: true
        error:
          $ref: '#/components/schemas/BatchIngestItemError'
    BatchIngestItemError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
    ExportRequest:
      type: object
      properties:
        framework:
          type: string
          description: Optional framework label included in exported evidence.
          example: hipaa
        org_id:
          type: string
          description: Optional organization scope for evidence export and settings application.
          example: acme
      additionalProperties: false
    OrgSettingsRequest:
      type: object
      properties:
        retention_policy:
          $ref: '#/components/schemas/FreeformObject'
        enabled_frameworks:
          type: array
          items:
            type: string
        guardrail_settings:
          $ref: '#/components/schemas/FreeformObject'
      additionalProperties: false
    OrgSettings:
      type: object
      required:
        - org_id
        - retention_policy
        - enabled_frameworks
        - guardrail_settings
        - created_at
        - updated_at
      properties:
        org_id:
          type: string
        retention_policy:
          $ref: '#/components/schemas/FreeformObject'
        enabled_frameworks:
          type: array
          items:
            type: string
        guardrail_settings:
          $ref: '#/components/schemas/FreeformObject'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      additionalProperties: false
    TraceActionBatch:
      type: object
      required:
        - actions
      properties:
        actions:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/TraceAction'
      additionalProperties: true
    TraceAction:
      type: object
      description: >
        Validated action payload accepted by `/v1/traces`. `session_id` and an
        agent identifier are required. `payload`, `action`, and `context` must
        be JSON objects when present.
      properties:
        session_id:
          type: string
        sessionId:
          type: string
        agent_id:
          type: string
        agentId:
          type: string
        agent:
          type: string
        name:
          type: string
        agent_type:
          type: string
        agentType:
          type: string
        type:
          type: string
        event_type:
          type: string
        status:
          type: string
        outcome:
          type: string
        idempotency_key:
          type: string
        idempotencyKey:
          type: string
        timestamp:
          type: string
          description: RFC3339 timestamp or unix timestamp in nanoseconds as a string.
        tool_name:
          type: string
        toolName:
          type: string
        target:
          type: string
        payload:
          $ref: '#/components/schemas/FreeformObject'
        action:
          type: object
          properties:
            type:
              type: string
            action_type:
              type: string
            tool_name:
              type: string
            toolName:
              type: string
            target:
              type: string
            status:
              type: string
          additionalProperties: true
        resource:
          oneOf:
            - type: string
            - $ref: '#/components/schemas/NamedResource'
      additionalProperties: true
    OtlpSpanBatch:
      type: object
      required:
        - spans
      properties:
        spans:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OtlpSpan'
      additionalProperties: true
    OtlpResourceSpansRequest:
      type: object
      required:
        - resourceSpans
      properties:
        resourceSpans:
          type: array
          minItems: 1
          items:
            type: object
            properties:
              resource:
                type: object
                properties:
                  attributes:
                    oneOf:
                      - $ref: '#/components/schemas/FreeformObject'
                      - type: array
                        items:
                          $ref: '#/components/schemas/OtlpKeyValueAttribute'
                additionalProperties: true
              attributes:
                oneOf:
                  - $ref: '#/components/schemas/FreeformObject'
                  - type: array
                    items:
                      $ref: '#/components/schemas/OtlpKeyValueAttribute'
              scopeSpans:
                type: array
                items:
                  $ref: '#/components/schemas/OtlpScopeSpans'
              instrumentationLibrarySpans:
                type: array
                items:
                  $ref: '#/components/schemas/OtlpScopeSpans'
            additionalProperties: true
      additionalProperties: true
    OtlpScopeSpans:
      type: object
      properties:
        spans:
          type: array
          items:
            $ref: '#/components/schemas/OtlpSpan'
      additionalProperties: true
    OtlpKeyValueAttribute:
      type: object
      required:
        - key
      properties:
        key:
          type: string
        value:
          $ref: '#/components/schemas/OtlpAnyValue'
      additionalProperties: true
    OtlpAnyValue:
      type: object
      description: OTLP AnyValue object.
      properties:
        stringValue:
          type: string
        boolValue:
          type: boolean
        intValue:
          oneOf:
            - type: integer
            - type: string
        doubleValue:
          type: number
        bytesValue:
          type: string
        arrayValue:
          type: object
          properties:
            values:
              type: array
              items:
                $ref: '#/components/schemas/OtlpAnyValue'
          additionalProperties: true
        kvlistValue:
          type: object
          properties:
            values:
              type: array
              items:
                $ref: '#/components/schemas/OtlpKeyValueAttribute'
          additionalProperties: true
      additionalProperties: true
    OtlpSpan:
      type: object
      required:
        - traceId
        - spanId
        - name
      properties:
        traceId:
          type: string
        trace_id:
          type: string
        spanId:
          type: string
        span_id:
          type: string
        parentSpanId:
          type: string
        parent_span_id:
          type: string
        name:
          type: string
        timestamp:
          type: string
          description: RFC3339 timestamp or unix timestamp in nanoseconds as a string.
        startTimeUnixNano:
          oneOf:
            - type: string
            - type: integer
        status:
          oneOf:
            - type: string
            - type: object
              additionalProperties: true
        outcome:
          type: string
        attributes:
          oneOf:
            - $ref: '#/components/schemas/FreeformObject'
            - type: array
              items:
                $ref: '#/components/schemas/OtlpKeyValueAttribute'
      additionalProperties: true
    ActionRecord:
      type: object
      required:
        - id
        - session_id
        - agent
        - agent_type
        - kind
        - type
        - source
        - timestamp
        - payload
        - hash
      properties:
        id:
          type: string
          format: uuid
        session_id:
          type: string
        agent:
          type: string
        agent_type:
          type: string
        kind:
          type: string
          enum:
            - action
            - oversight
        type:
          type: string
        tool_name:
          type: string
          nullable: true
        target:
          type: string
          nullable: true
        source:
          type: string
        timestamp:
          type: string
          format: date-time
        payload:
          $ref: '#/components/schemas/FreeformObject'
        hash:
          type: string
        previous_hash:
          type: string
          nullable: true
      additionalProperties: false
    OversightEventRequest:
      type: object
      properties:
        severity:
          type: string
        note:
          type: string
        message:
          type: string
        framework:
          type: string
        session_id:
          type: string
        sessionId:
          type: string
        timestamp:
          type: string
          description: RFC3339 timestamp or unix timestamp in nanoseconds as a string.
      additionalProperties: true
    OversightEvent:
      type: object
      required:
        - id
        - severity
        - note
        - timestamp
        - payload
        - hash
      properties:
        id:
          type: string
          format: uuid
        session_id:
          type: string
          nullable: true
        framework:
          type: string
          nullable: true
        severity:
          type: string
        note:
          type: string
        timestamp:
          type: string
          format: date-time
        payload:
          $ref: '#/components/schemas/FreeformObject'
        hash:
          type: string
        previous_hash:
          type: string
          nullable: true
      additionalProperties: false
    ComplianceControlResult:
      type: object
      required:
        - id
