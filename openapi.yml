openapi: 3.0.3
info:
  title: Trailing API
  version: 0.1.0
  description: >
    HTTP API for ingesting agent traces, recording oversight events, querying the
    audit log, exporting evidence packages, checking health and integrity, and
    managing MFA enrollment and verification for human accounts in the Trailing
    service.
servers:
  - url: /
security:
  - {}
  - ApiKeyAuth: []
tags:
  - name: Ingestion
  - name: Actions
  - name: Oversight
  - name: Organizations
  - name: Compliance
  - name: Export
  - name: Operations
  - name: Auth
paths:
  /v1/openapi.yml:
    get:
      tags:
        - Operations
      summary: Fetch the OpenAPI specification
      description: Returns this OpenAPI document in YAML format.
      operationId: getOpenApiSpec
      responses:
        '200':
          description: OpenAPI document in YAML format.
          content:
            text/yaml:
              schema:
                type: string
              example: |
                openapi: 3.0.3
                info:
                  title: Trailing API
                  version: 0.1.0
        '401':
          description: API key required when the server is configured with one.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: missing or invalid API key
                code: UNAUTHORIZED
        '429':
          description: Request rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: rate limit exceeded
                code: RATE_LIMITED
  /v1/traces:
    post:
      tags:
        - Ingestion
      summary: Ingest SDK trace events
      description: >
        Accepts either a single action object or an object containing an
        `actions` array. Each event is validated before persistence. When
        `X-API-Key` is used with a shared server key, `X-Trailing-Org-Id` is
        required so the write can be scoped to an organization. Idempotent
        replays can provide `Idempotency-Key` or a per-item `idempotency_key`.
      operationId: postTraces
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/TraceAction'
                - $ref: '#/components/schemas/TraceActionBatch'
            examples:
              single:
                summary: Single action payload
                value:
                  session_id: session-123
                  agent_id: planner-agent
                  agent_type: orchestrator
                  timestamp: '2026-03-30T12:00:00Z'
                  action:
                    type: tool_call
                    tool_name: web.search
                    target: https://example.com/policy
                    status: ok
                  payload:
                    query: policy evidence retention
              batch:
                summary: Batched action payload
                value:
                  actions:
                    - session_id: session-123
                      agent: planner-agent
                      agent_type: orchestrator
                      type: decision
                      status: ok
                      payload:
                        decision: continue
                    - session_id: session-123
                      agent: planner-agent
                      agent_type: orchestrator
                      action:
                        type: tool_call
                        tool_name: fs.read
                        target: /tmp/evidence.json
      responses:
        '200':
          description: Idempotent replay matched an existing action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestResponse'
              example:
                ingested: 0
                action_ids:
                  - 5c7a54a7-4e0d-4ad8-8f4e-d1f1ef5c2f23
        '201':
          description: One or more actions were persisted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestResponse'
              example:
                ingested: 2
                action_ids:
                  - 5c7a54a7-4e0d-4ad8-8f4e-d1f1ef5c2f23
                  - 58df5507-a14c-4096-bdfa-41fd86034c65
        '207':
          description: Batch ingestion partially succeeded with per-item validation errors.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchIngestResponse'
              example:
                ingested: 1
                failed: 1
                action_ids:
                  - 5c7a54a7-4e0d-4ad8-8f4e-d1f1ef5c2f23
                results:
                  - index: 0
                    status: accepted
                    action_id: 5c7a54a7-4e0d-4ad8-8f4e-d1f1ef5c2f23
                  - index: 1
                    status: rejected
                    error:
                      code: MISSING_FIELD
                      message: trace event is missing required field `session_id`
        '400':
          description: Invalid JSON, missing required fields, or invalid payload shape.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: missing required field `actions`
                code: MISSING_FIELD
        '401':
          description: API key required when the server is configured with one.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: missing or invalid API key
                code: UNAUTHORIZED
        '413':
          description: Request body exceeded the configured size limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Failed to buffer the request body
                code: REQUEST_TOO_LARGE
        '429':
          description: Request rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: rate limit exceeded
                code: RATE_LIMITED
        '500':
          description: Storage or internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "storage error: failed to append action"
                code: INTERNAL_ERROR
  /v1/traces/batch:
    post:
      tags:
        - Ingestion
      summary: Ingest a batch of SDK trace events
      description: >
        Accepts an `actions` array and applies per-item validation. Valid items
        are persisted even if other items in the batch are rejected.
      operationId: postTracesBatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TraceActionBatch'
      responses:
        '201':
          description: Every item in the batch was accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchIngestResponse'
        '207':
          description: One or more items were rejected while valid items were persisted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchIngestResponse'
        '400':
          description: The request body is invalid or the `actions` array is missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: API key required when the server is configured with one, or an org scope is missing for ingest.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Request body exceeded the configured size limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Request rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Storage or internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/traces/otlp:
    post:
      tags:
        - Ingestion
      summary: Ingest OTLP spans
      description: >
        Accepts a single OTLP span, an object with a `spans` array, or a
        ResourceSpans-style OTLP export payload.
      operationId: postTracesOtlp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/OtlpSpan'
                - $ref: '#/components/schemas/OtlpSpanBatch'
                - $ref: '#/components/schemas/OtlpResourceSpansRequest'
            examples:
              spans:
                summary: Direct spans array
                value:
                  spans:
                    - traceId: 8f61f17dfeff4d8995b7c9fbd4ae2ad1
                      spanId: 4d889c7ce2f7bc21
                      parentSpanId: session-123
                      name: tool.execute
                      startTimeUnixNano: '1711800000000000000'
                      attributes:
                        agent.id: planner-agent
                        agent.type: orchestrator
                        tool.name: web.search
                        http.url: https://example.com/policy
              resourceSpans:
                summary: OTLP resourceSpans payload
                value:
                  resourceSpans:
                    - resource:
                        attributes:
                          - key: agent.id
                            value:
                              stringValue: planner-agent
                          - key: agent.type
                            value:
                              stringValue: orchestrator
                      scopeSpans:
                        - spans:
                            - traceId: 8f61f17dfeff4d8995b7c9fbd4ae2ad1
                              spanId: 4d889c7ce2f7bc21
                              name: tool.execute
      responses:
        '201':
          description: One or more OTLP spans were normalized and persisted as actions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestResponse'
              example:
                ingested: 1
                action_ids:
                  - 5c7a54a7-4e0d-4ad8-8f4e-d1f1ef5c2f23
        '400':
          description: Invalid JSON, missing spans, or a required OTLP field is absent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: OTLP span is missing required field `traceId`
                code: MISSING_FIELD
        '401':
          description: API key required when the server is configured with one.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: missing or invalid API key
                code: UNAUTHORIZED
        '413':
          description: Request body exceeded the configured size limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Failed to buffer the request body
                code: REQUEST_TOO_LARGE
        '429':
          description: Request rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: rate limit exceeded
                code: RATE_LIMITED
        '500':
          description: Storage or internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "storage error: failed to append action"
                code: INTERNAL_ERROR
  /v1/events:
    get:
      tags:
        - Actions
      summary: Stream live action and oversight events
      description: >
        Returns a Server-Sent Events stream that emits `action` and `oversight`
        events as new records are ingested. The server also sends heartbeat
        comments every 15 seconds to keep the connection active.
      operationId: getEvents
      responses:
        '200':
          description: SSE stream of live action and oversight events.
          content:
            text/event-stream:
              schema:
                type: string
              example: |
                event: action
                data: {"id":"5c7a54a7-4e0d-4ad8-8f4e-d1f1ef5c2f23","session_id":"session-123"}

                : heartbeat

        '401':
          description: API key required when the server is configured with one.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: missing or invalid API key
                code: UNAUTHORIZED
        '429':
          description: Request rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: rate limit exceeded
                code: RATE_LIMITED
  /v1/actions:
    get:
      tags:
        - Actions
      summary: List recorded actions
      description: >
        Returns paginated action records. Set `include_oversight=true` to include
        oversight entries mapped into the same response shape with `kind:
        oversight`.
      operationId: getActions
      parameters:
        - name: session_id
          in: query
          description: Filter by session identifier.
          schema:
            type: string
          example: session-123
        - name: agent
          in: query
          description: Filter by agent identifier.
          schema:
            type: string
          example: planner-agent
        - name: from
          in: query
          description: Inclusive RFC3339 lower bound for action timestamps.
          schema:
            type: string
            format: date-time
          example: '2026-03-30T00:00:00Z'
        - name: to
          in: query
          description: Inclusive RFC3339 upper bound for action timestamps.
          schema:
            type: string
            format: date-time
          example: '2026-03-30T23:59:59Z'
        - name: type
          in: query
          description: Filter by normalized action type.
          schema:
            type: string
          example: tool_call
        - name: include_oversight
          in: query
          description: Include oversight events in the returned records.
          schema:
            type: boolean
          example: true
        - name: limit
          in: query
          description: >
            Page size. Defaults to 100 and is capped at 1000 by the server.
          schema:
            type: integer
            minimum: 1
            maximum: 1000
          example: 50
        - name: offset
          in: query
          description: Zero-based offset into the filtered result set.
          schema:
            type: integer
            minimum: 0
          example: 0
      responses:
        '200':
          description: Matching actions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedActionsResponse'
              example:
                actions:
                  - id: 5c7a54a7-4e0d-4ad8-8f4e-d1f1ef5c2f23
                    session_id: session-123
                    agent: planner-agent
                    agent_type: orchestrator
                    kind: action
                    type: tool_call
                    tool_name: web.search
                    target: https://example.com/policy
                    source: sdk
                    timestamp: '2026-03-30T12:00:00Z'
                    payload:
                      query: policy evidence retention
                    hash: 1f0af93c8f483594e2e4f5e2a65be87d21e7d4ef
                    previous_hash: 477d40661f95b7f7b5f7af936c7c8f7818b10b20
                total: 1
                pagination:
                  limit: 50
                  offset: 0
                  count: 1
                  has_more: false
        '400':
          description: Invalid query parameters, such as malformed timestamps.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "invalid RFC3339 timestamp: not-a-time"
                code: INVALID_REQUEST
        '401':
          description: API key required when the server is configured with one.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: missing or invalid API key
                code: UNAUTHORIZED
        '429':
          description: Request rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: rate limit exceeded
                code: RATE_LIMITED
        '500':
          description: Storage or internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "storage error: failed to load entries"
                code: INTERNAL_ERROR
  /v1/actions/{id}:
    get:
      tags:
        - Actions
      summary: Fetch one recorded action by id
      description: Returns a single persisted record by identifier.
      operationId: getAction
      parameters:
        - name: id
          in: path
          required: true
          description: Action record identifier.
          schema:
            type: string
            format: uuid
          example: 5c7a54a7-4e0d-4ad8-8f4e-d1f1ef5c2f23
      responses:
        '200':
          description: Action record found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionRecord'
              example:
                id: 5c7a54a7-4e0d-4ad8-8f4e-d1f1ef5c2f23
                session_id: session-123
                agent: planner-agent
                agent_type: orchestrator
                kind: action
                type: tool_call
                tool_name: web.search
                target: https://example.com/policy
                source: sdk
                timestamp: '2026-03-30T12:00:00Z'
                payload:
                  query: policy evidence retention
                hash: 1f0af93c8f483594e2e4f5e2a65be87d21e7d4ef
                previous_hash: 477d40661f95b7f7b5f7af936c7c8f7818b10b20
        '401':
          description: API key required when the server is configured with one.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: missing or invalid API key
                code: UNAUTHORIZED
        '404':
          description: Action was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: action 5c7a54a7-4e0d-4ad8-8f4e-d1f1ef5c2f23 not found
                code: NOT_FOUND
        '429':
          description: Request rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: rate limit exceeded
                code: RATE_LIMITED
        '500':
          description: Storage or internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "storage error: failed to load entries"
                code: INTERNAL_ERROR
  /v1/me:
    get:
      tags:
        - Auth
      summary: Fetch current SSO session identity
      description: Returns the authenticated human session represented by the bearer session token.
      operationId: getMe
      responses:
        '200':
          description: Current authenticated SSO session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionIdentityResponse'
              example:
                session_id: sess_123
                user_id: user_123
                org_id: org-1
                email: analyst@example.com
                display_name: Alex Analyst
                role: admin
                expires_at: '2026-03-30T20:00:00Z'
        '401':
          description: Missing or invalid bearer session token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: missing or invalid bearer session
                code: UNAUTHORIZED
        '429':
          description: Request rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: rate limit exceeded
                code: RATE_LIMITED
  /v1/auth/audit:
    get:
      tags:
        - Auth
      summary: List auth audit events
      description: >
        Returns paginated authentication, SSO, and MFA audit events. Results
        can be filtered by organization, event type, actor, subject, and time
        window.
      operationId: getAuthAudit
      parameters:
        - name: org_id
          in: query
          required: false
          description: Optional organization scope filter.
          schema:
            type: string
          example: org-1
        - name: type
          in: query
          required: false
          description: Optional auth audit event type filter.
          schema:
            type: string
          example: auth.mfa.challenge
        - name: actor_id
          in: query
          required: false
          description: Optional actor identifier filter.
          schema:
            type: string
          example: user_123
        - name: subject_id
          in: query
          required: false
          description: Optional subject identifier filter.
          schema:
            type: string
          example: analyst@example.com
        - name: from
          in: query
          required: false
          description: Optional inclusive start timestamp in RFC3339 format.
          schema:
            type: string
            format: date-time
          example: '2026-03-30T00:00:00Z'
        - name: to
          in: query
          required: false
          description: Optional inclusive end timestamp in RFC3339 format.
          schema:
            type: string
            format: date-time
          example: '2026-03-31T00:00:00Z'
        - name: limit
          in: query
          required: false
          description: Maximum number of events to return.
          schema:
            type: integer
            minimum: 1
            maximum: 1000
          example: 100
        - name: offset
          in: query
          required: false
          description: Number of events to skip before returning results.
          schema:
            type: integer
            minimum: 0
          example: 0
      responses:
        '200':
          description: Paginated auth audit events.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAuthAuditResponse'
              example:
                events:
                  - id: 5c7a54a7-4e0d-4ad8-8f4e-d1f1ef5c2f23
                    timestamp: '2026-03-30T12:00:00Z'
                    event_type: auth.mfa.challenge
                    org_id: org-1
                    actor_type: user
                    actor_id: user_123
                    subject_type: email
                    subject_id: analyst@example.com
                    payload:
                      event: auth.mfa.challenge
                      mfa_status: challenge_required
                      result: pending
                    outcome: pending
                    hash: ec99a48c198cf2a2b8578da4f9dbd1982fe40f2c
                    previous_hash: 1f0af93c8f483594e2e4f5e2a65be87d21e7d4ef
                total: 1
                pagination:
                  limit: 100
                  offset: 0
                  count: 1
                  has_more: false
        '400':
          description: Invalid query parameters, such as malformed timestamps.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "invalid RFC3339 timestamp: not-a-time"
                code: INVALID_REQUEST
        '401':
          description: API key required when the server is configured with one.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: missing or invalid API key
                code: UNAUTHORIZED
        '429':
          description: Request rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: rate limit exceeded
                code: RATE_LIMITED
        '500':
          description: Storage or internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "storage error: failed to load auth audit entries"
                code: INTERNAL_ERROR
  /v1/auth/audit/export:
    post:
      tags:
        - Auth
      summary: Export auth audit events
      description: Exports auth audit events matching the supplied filter set.
      operationId: postAuthAuditExport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthAuditExportRequest'
            example:
              org_id: org-1
              type: auth.mfa.challenge
              actor_id: user_123
              from: '2026-03-30T00:00:00Z'
              to: '2026-03-31T00:00:00Z'
      responses:
        '200':
          description: Auth audit export generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthAuditExportResponse'
              example:
                exported_at: '2026-03-31T00:00:00Z'
                count: 1
                filters:
                  org_id: org-1
                  type: auth.mfa.challenge
                  actor_id: user_123
                  subject_id: analyst@example.com
                  from: '2026-03-30T00:00:00Z'
                  to: '2026-03-31T00:00:00Z'
                events:
                  - id: 5c7a54a7-4e0d-4ad8-8f4e-d1f1ef5c2f23
                    timestamp: '2026-03-30T12:00:00Z'
                    event_type: auth.mfa.challenge
                    org_id: org-1
                    actor_type: user
                    actor_id: user_123
                    subject_type: email
                    subject_id: analyst@example.com
                    payload:
                      event: auth.mfa.challenge
                      mfa_status: challenge_required
                      result: pending
                    outcome: pending
                    hash: ec99a48c198cf2a2b8578da4f9dbd1982fe40f2c
                    previous_hash: 1f0af93c8f483594e2e4f5e2a65be87d21e7d4ef
        '400':
          description: Invalid JSON body or malformed timestamps.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "invalid RFC3339 timestamp: not-a-time"
                code: INVALID_REQUEST
        '401':
          description: API key required when the server is configured with one.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: missing or invalid API key
                code: UNAUTHORIZED
        '413':
          description: Request body exceeded the configured size limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Failed to buffer the request body
                code: REQUEST_TOO_LARGE
        '429':
          description: Request rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: rate limit exceeded
                code: RATE_LIMITED
        '500':
          description: Storage or internal server error.
          content:
            application/json:
              schema:
