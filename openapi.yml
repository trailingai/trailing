                  value:
                    status: authenticated
                    org_id: org-1
                    email: analyst@example.com
                    mfa_required: false
                    mfa_status: not_enabled
                challenged:
                  value:
                    status: challenge_required
                    org_id: org-1
                    email: analyst@example.com
                    challenge_id: b8d3edbe-5d39-4c67-bf44-7bb5ea7d0f70
                    expires_at: '2026-03-30T12:10:00Z'
                    mfa_required: true
