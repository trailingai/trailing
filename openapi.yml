  /v1/compliance/{framework}:
    get:
      tags:
        - Compliance
      summary: Build a compliance report
      description: >
        Evaluates persisted actions and oversight events against one supported
        framework and returns matched controls, gaps, and evidence references.
        Supported canonical framework names are `eu-ai-act`, `nist-ai-rmf`,
        `sr-11-7`, `hipaa`, and `fda-21-cfr-part-11`. The server also accepts
        common aliases.
      operationId: getCompliance
      parameters:
        - name: framework
          in: path
          required: true
          description: Compliance framework name or supported alias.
          schema:
            type: string
          example: hipaa
        - name: org_id
          in: query
          description: Restrict evaluation to one organization id and apply its settings.
          schema:
            type: string
          example: acme
        - name: session_id
          in: query
          description: Restrict evaluation to one session id.
          schema:
            type: string
          example: session-123
        - name: from
          in: query
          description: Inclusive RFC3339 lower bound for record timestamps.
          schema:
            type: string
            format: date-time
          example: '2026-03-30T00:00:00Z'
        - name: to
          in: query
          description: Inclusive RFC3339 upper bound for record timestamps.
          schema:
            type: string
            format: date-time
          example: '2026-03-30T23:59:59Z'
      responses:
        '200':
          description: Compliance evaluation result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceReport'
              example:
                framework: hipaa
                total_actions: 12
                oversight_events: 2
                integrity_valid: true
                score: 75
                controls_met:
                  - id: HIPAA-164.312(b)
                    article: 45 CFR 164.312(b)
                    requirement: Implement hardware, software, and/or procedural mechanisms.
                    matched_evidence:
                      - audit trail
                    missing_evidence: []
                    evidence_refs:
                      - action:5c7a54a7-4e0d-4ad8-8f4e-d1f1ef5c2f23
                controls_gaps:
                  - id: HIPAA-164.308(a)(1)
                    article: 45 CFR 164.308(a)(1)
                    requirement: Implement policies and procedures to prevent, detect, contain, and correct security violations.
                    matched_evidence: []
                    missing_evidence:
                      - risk management process
                    evidence_refs:
                      - oversight:88ad9b6b-4549-4b61-b92c-f6db1c2d860e
                evidence_refs:
                  - action:5c7a54a7-4e0d-4ad8-8f4e-d1f1ef5c2f23
                  - oversight:88ad9b6b-4549-4b61-b92c-f6db1c2d860e
        '400':
          description: Invalid time window or malformed timestamps.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: '`from` must be earlier than or equal to `to`'
                code: INVALID_REQUEST
        '401':
          description: API key required when the server is configured with one.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: missing or invalid API key
                code: UNAUTHORIZED
        '404':
          description: Unsupported framework.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: framework `soc2` is not supported
                code: UNSUPPORTED_FRAMEWORK
        '429':
          description: Request rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: rate limit exceeded
                code: RATE_LIMITED
        '500':
          description: Storage or internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "storage error: failed to load entries"
                code: INTERNAL_ERROR
