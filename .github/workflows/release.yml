name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release-linux:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: trailing-linux-x86_64
            build_tool: cargo
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: trailing-linux-aarch64
            build_tool: zigbuild
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: trailing-darwin-x86_64
            build_tool: cargo
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: trailing-darwin-aarch64
            build_tool: cargo
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install Zig
        if: matrix.build_tool == 'zigbuild'
        uses: goto-bus-stop/setup-zig@v2

      - name: Install cargo-zigbuild
        if: matrix.build_tool == 'zigbuild'
        run: cargo install --locked cargo-zigbuild

      - name: Build release binary
        run: |
          if [ "${{ matrix.build_tool }}" = "zigbuild" ]; then
            cargo zigbuild --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/trailing dist/${{ matrix.asset_name }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs: release-linux
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  publish-pypi:
    runs-on: ubuntu-latest
    needs: release-linux
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packaging tools
        run: python -m pip install --upgrade pip build twine

      - name: Build Python package
        working-directory: sdk/python
        run: python -m build

      - name: Publish to PyPI
        working-directory: sdk/python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload dist/*

  publish-npm:
    runs-on: ubuntu-latest
    needs: release-linux
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        working-directory: sdk/node
        run: npm install

      - name: Build Node package
        working-directory: sdk/node
        run: npm run build

      - name: Publish to npm
        working-directory: sdk/node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish
